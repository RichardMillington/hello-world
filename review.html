<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Data Review | FeverBee</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card-border: #2a2d3a;
      --text: #e0e0e0;
      --text-muted: #8a8d9a;
      --accent: #d4a843;
      --accent-dim: rgba(212,168,67,0.15);
      --green: #4caf50;
      --red: #ef5350;
      --blue: #42a5f5;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Montserrat',sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
      padding:0;
    }
    .header {
      background:linear-gradient(135deg,#1a1d27 0%,#252838 100%);
      border-bottom:2px solid var(--accent);
      padding:30px 40px;
      text-align:center;
    }
    .header .logo { font-size:14px; letter-spacing:6px; color:var(--text-muted); margin-bottom:8px; }
    .header .logo span { color:var(--accent); }
    .header h1 { font-size:28px; font-weight:700; margin-bottom:6px; }
    .header p { color:var(--text-muted); font-size:14px; max-width:600px; margin:0 auto; }

    .container { max-width:900px; margin:0 auto; padding:30px 20px; }

    .intro-box {
      background:var(--accent-dim);
      border:1px solid var(--accent);
      border-radius:10px;
      padding:20px 24px;
      margin-bottom:30px;
      font-size:14px;
    }
    .intro-box strong { color:var(--accent); }

    .section {
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:10px;
      margin-bottom:20px;
      overflow:hidden;
    }
    .section-header {
      background:rgba(212,168,67,0.08);
      padding:14px 20px;
      font-weight:700;
      font-size:16px;
      border-bottom:1px solid var(--card-border);
      display:flex;
      align-items:center;
      gap:10px;
    }
    .section-header .badge {
      background:var(--accent);
      color:#000;
      font-size:11px;
      font-weight:700;
      padding:2px 8px;
      border-radius:4px;
    }
    .section-body { padding:16px 20px; }

    /* Score rows */
    .score-row {
      display:grid;
      grid-template-columns:200px 80px 1fr 60px;
      gap:12px;
      align-items:start;
      padding:12px 0;
      border-bottom:1px solid var(--card-border);
    }
    .score-row:last-child { border-bottom:none; }
    .score-label { font-weight:600; font-size:14px; }
    .score-value {
      font-weight:700;
      font-size:16px;
      color:var(--accent);
      text-align:center;
    }
    .score-explainer { font-size:13px; color:var(--text-muted); }

    /* Feature rows */
    .feature-row {
      display:grid;
      grid-template-columns:250px 80px 1fr;
      gap:12px;
      align-items:start;
      padding:10px 0;
      border-bottom:1px solid var(--card-border);
    }
    .feature-row:last-child { border-bottom:none; }
    .feature-name { font-weight:500; font-size:14px; }
    .feature-val { text-align:center; font-weight:600; }
    .feature-val.yes { color:var(--green); }
    .feature-val.no { color:var(--red); }
    .feature-val.partial { color:var(--blue); }

    /* Text rows */
    .text-row {
      padding:12px 0;
      border-bottom:1px solid var(--card-border);
    }
    .text-row:last-child { border-bottom:none; }
    .text-row-label { font-weight:600; font-size:14px; margin-bottom:4px; color:var(--accent); }
    .text-row-value { font-size:13px; color:var(--text-muted); }

    /* List items */
    .list-item {
      padding:8px 0;
      font-size:13px;
      border-bottom:1px solid var(--card-border);
      display:flex;
      gap:8px;
    }
    .list-item:last-child { border-bottom:none; }
    .list-item::before { content:"â¢"; color:var(--accent); font-weight:700; }

    /* Feedback controls */
    .feedback-toggle {
      display:flex;
      gap:4px;
    }
    .fb-btn {
      background:transparent;
      border:1px solid var(--card-border);
      color:var(--text-muted);
      font-size:16px;
      width:28px;
      height:28px;
      border-radius:4px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:all 0.2s;
    }
    .fb-btn:hover { border-color:var(--text); color:var(--text); }
    .fb-btn.active-yes { background:rgba(76,175,80,0.2); border-color:var(--green); color:var(--green); }
    .fb-btn.active-no { background:rgba(239,83,80,0.2); border-color:var(--red); color:var(--red); }

    .correction-input {
      display:none;
      margin-top:8px;
      grid-column:1/-1;
    }
    .correction-input.visible { display:block; }
    .correction-input textarea {
      width:100%;
      background:var(--bg);
      border:1px solid var(--card-border);
      color:var(--text);
      font-family:inherit;
      font-size:13px;
      padding:8px 12px;
      border-radius:6px;
      resize:vertical;
      min-height:60px;
    }
    .correction-input textarea:focus { outline:none; border-color:var(--accent); }
    .correction-input label { font-size:12px; color:var(--text-muted); display:block; margin-bottom:4px; }

    /* General additions textarea at bottom of each section */
    .additions-area {
      padding:16px 20px;
      border-top:1px solid var(--card-border);
      background:rgba(0,0,0,0.15);
    }
    .additions-area label { font-size:13px; font-weight:600; display:block; margin-bottom:6px; }
    .additions-area textarea {
      width:100%;
      background:var(--bg);
      border:1px solid var(--card-border);
      color:var(--text);
      font-family:inherit;
      font-size:13px;
      padding:10px 12px;
      border-radius:6px;
      resize:vertical;
      min-height:70px;
    }
    .additions-area textarea:focus { outline:none; border-color:var(--accent); }

    /* Submit section */
    .submit-section {
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:10px;
      padding:24px;
      text-align:center;
      margin-top:30px;
    }
    .submit-section h3 { margin-bottom:8px; }
    .submit-section p { color:var(--text-muted); font-size:13px; margin-bottom:16px; }
    .submit-btn {
      background:var(--accent);
      color:#000;
      border:none;
      font-family:inherit;
      font-weight:700;
      font-size:15px;
      padding:12px 40px;
      border-radius:8px;
      cursor:pointer;
      transition:all 0.2s;
    }
    .submit-btn:hover { background:#e0b84d; transform:translateY(-1px); }
    .submit-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

    .summary-count {
      margin-top:12px;
      font-size:13px;
      color:var(--text-muted);
    }

    /* Info/meta row */
    .meta-row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-bottom:20px;
    }
    .meta-card {
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:10px;
      padding:16px 20px;
    }
    .meta-label { font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
    .meta-value { font-size:16px; font-weight:600; }

    .no-platform {
      text-align:center;
      padding:80px 20px;
    }
    .no-platform h2 { margin-bottom:12px; }
    .no-platform p { color:var(--text-muted); }

    @media (max-width:700px) {
      .score-row { grid-template-columns:1fr; gap:4px; }
      .score-value { text-align:left; }
      .feature-row { grid-template-columns:1fr 60px; }
      .meta-row { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">FEVER<span>BEE</span></div>
    <h1 id="pageTitle">Platform Data Review</h1>
    <p id="pageSubtitle">Help us ensure the data we publish about your platform is accurate and up to date.</p>
  </div>

  <div class="container" id="mainContent">
    <div class="no-platform" id="noPlatform" style="display:none;">
      <h2>No platform specified</h2>
      <p>This page requires a platform parameter. Please use the link provided by FeverBee.</p>
    </div>
  </div>

  <script src="data/platforms.js"></script>
  <script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const pid = params.get('platform');
  if(!pid){
    document.getElementById('noPlatform').style.display='block';
    return;
  }

  const p = platforms.find(x => x.id === pid);
  if(!p){
    document.getElementById('noPlatform').style.display='block';
    document.querySelector('#noPlatform p').textContent=`Platform "${pid}" not found. Please check the link provided by FeverBee.`;
    return;
  }

  document.title = `${p.name} Data Review | FeverBee`;
  document.getElementById('pageTitle').textContent = `${p.name} â Data Review`;

  const container = document.getElementById('mainContent');
  const corrections = {}; // track all corrections

  // Intro box
  container.innerHTML = `
    <div class="intro-box">
      <strong>Hello!</strong> Below is all the data FeverBee currently publishes about <strong>${p.name}</strong> in our
      <a href="https://richardmillington.github.io/hello-world/" style="color:var(--accent)">Community Platform Comparison Tool</a>.
      Please review each section. For any item, click <span style="color:var(--green)">&#10003;</span> if correct or
      <span style="color:var(--red)">&#10007;</span> if it needs updating, then provide your correction.
      You can also add information we may have missed using the text boxes at the bottom of each section.
    </div>

    <div class="meta-row">
      <div class="meta-card">
        <div class="meta-label">Category</div>
        <div class="meta-value">${p.catLabel}</div>
      </div>
      <div class="meta-card">
        <div class="meta-label">Pricing</div>
        <div class="meta-value">${p.pricing}</div>
      </div>
    </div>
    <div class="meta-row">
      <div class="meta-card">
        <div class="meta-label">Target Market</div>
        <div class="meta-value">${p.target}</div>
      </div>
      <div class="meta-card">
        <div class="meta-label">Our Current Verdict</div>
        <div class="meta-value">${p.verdict}</div>
      </div>
    </div>
  `;

  function uid(){ return 'f'+Math.random().toString(36).substr(2,9); }

  function makeFeedbackBtns(key, label){
    const id = uid();
    return `<div class="feedback-toggle" data-key="${key}">
      <button class="fb-btn" data-val="yes" onclick="markFeedback(this,'${id}')" title="Correct">&#10003;</button>
      <button class="fb-btn" data-val="no" onclick="markFeedback(this,'${id}')" title="Needs correction">&#10007;</button>
    </div>
    <div class="correction-input" id="${id}">
      <label>What should it say instead?</label>
      <textarea placeholder="Enter the correct information..." oninput="trackCorrection('${key}',this.value,'${label}')"></textarea>
    </div>`;
  }

  // --- SCORES SECTION ---
  const scoreLabels = {
    featureCompleteness:"Feature Completeness",
    easeOfUse:"Ease of Use",
    qualityOfFeatures:"Quality of Features",
    integrations:"Integrations",
    dataPrivacySecurity:"Data Privacy & Security",
    servicesSupport:"Services & Support",
    reportsAnalytics:"Reports & Analytics"
  };

  let scoresHTML = '';
  for(const [key,label] of Object.entries(scoreLabels)){
    const val = p[key];
    const exp = p.scoreExplainers?.[key] || '';
    const ck = `score_${key}`;
    scoresHTML += `<div class="score-row">
      <div class="score-label">${label}</div>
      <div class="score-value">${val}/10</div>
      <div class="score-explainer">${exp}</div>
      ${makeFeedbackBtns(ck, label+' ('+val+'/10)')}
    </div>`;
  }

  container.innerHTML += `
    <div class="section">
      <div class="section-header">Scores <span class="badge">7 dimensions</span></div>
      <div class="section-body">${scoresHTML}</div>
    <div class="additions-area">
        <label>Any scoring corrections or context you'd like to add?</label>
        <textarea placeholder="e.g. Our analytics have been completely rebuilt since Q3 2025..." oninput="trackCorrection('scores_general',this.value,'General scoring notes')"></textarea>
      </div>
    </div>`;

  // --- COMMUNITY FEATURES SECTION ---
  let featHTML = '';
  if(p.communityFeatures){
    for(const [feat,val] of Object.entries(p.communityFeatures)){
      const display = val===true?'Yes':val===false?'No':String(val);
      const cls = val===true?'yes':val===false?'no':'partial';
      const ck = `feat_${feat.replace(/[^a-zA-Z0-9]/g,'_')}`;
      featHTML += `<div class="feature-row">
        <div class="feature-name">${feat}</div>
        <div class="feature-val ${cls}">${display}</div>
        ${makeFeedbackBtns(ck, feat+': '+display)}
      </div>`;
    }
  }

  container.innerHTML += `
    <div class="section">
      <div class="section-header">Community Features <span class="badge">Yes / No / Partial</span></div>
      <div class="section-body">${featHTML}</div>
      <div class="additions-area">
        <label>Any features we're missing or have wrong?</label>
        <textarea placeholder="e.g. We now have native events support as of January 2026..." oninput="trackCorrection('features_general',this.value,'General features notes')"></textarea>
      </div>
    </div>`;

  // --- EXECUTION / HOW FEATURES WORK ---
  let execHTML = '';
  if(p.execution){
    for(const [area,desc] of Object.entries(p.execution)){
      const ck = `exec_${area.replace(/[^a-zA-Z0-9]/g,'_')}`;
      execHTML += `<div class="text-row">
        <div class="text-row-label">${area}</div>
        <div class="text-row-value">${desc}</div>
        ${makeFeedbackBtns(ck, area)}
      </div>`;
    }
  }

  container.innerHTML += `
    <div class="section">
      <div class="section-header">How Features Work <span class="badge">Detailed descriptions</span></div>
      <div class="section-body">${execHTML}</div>
      <div class="additions-area">
        <label>Anything to add or correct about how your features work?</label>
        <textarea placeholder="e.g. Our AI approach has changed significantly since..." oninput="trackCorrection('execution_general',this.value,'General execution notes')"></textarea>
      </div>
    </div>`;

  // --- KEY INTEGRATIONS ---
  let intHTML = '';
  if(p.keyIntegrations){
    for(let i=0;i<p.keyIntegrations.length;i++){
      const ck = `integ_${i}`;
      intHTML += `<div class="list-item" style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;">
        <span style="flex:1">${p.keyIntegrations[i]}</span>
        ${makeFeedbackBtns(ck, 'Integration: '+p.keyIntegrations[i])}
      </div>`;
    }
  }

  container.innerHTML += `
    <div class="section">
      <div class="section-header">Key Integrations</div>
      <div class="section-body">${intHTML}</div>
      <div class="additions-area">
        <label>Any integrations we're missing or have described incorrectly?</label>
        <textarea placeholder="e.g. We also integrate with HubSpot, Monday.com..." oninput="trackCorrection('integrations_general',this.value,'General integrations notes')"></textarea>
      </div>
    </div>`;

  // --- STRENGTHS ---
  let strHTML = '';
  if(p.strengths){
    for(let i=0;i<p.strengths.length;i++){
      const ck = `str_${i}`;
      strHTML += `<div class="list-item" style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;">
        <span style="flex:1">${p.strengths[i]}</span>
        ${makeFeedbackBtns(ck, 'Strength: '+p.strengths[i].substring(0,50))}
      </div>`;
    }
  }

  container.innerHTML += `
    <div class="section">
      <div class="section-header">Strengths We List</div>
      <div class="section-body">${strHTML}</div>
      <div class="additions-area">
        <label>Any strengths we should add or corrections to make?</label>
        <textarea placeholder="e.g. A key strength you're missing is..." oninput="trackCorrection('strengths_general',this.value,'General strengths notes')"></textarea>
      </div>
    </div>`;

  // --- CONSIDERATIONS ---
  let conHTML = '';
  if(p.considerations){
    for(let i=0;i<p.considerations.length;i++){
      const ck = `con_${i}`;
      conHTML += `<div class="list-item" style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;">
        <span style="flex:1">${p.considerations[i]}</span>
        ${makeFeedbackBtns(ck, 'Consideration: '+p.considerations[i].substring(0,50))}
      </div>`;
    }
  }

  container.innerHTML += `
    <div class="section">
      <div class="section-header">Considerations We List</div>
      <div class="section-body">${conHTML}</div>
      <div class="additions-area">
        <label>Any considerations you'd like to respond to or correct?</label>
        <textarea placeholder="e.g. Regarding the point about pricing, we now offer..." oninput="trackCorrection('considerations_general',this.value,'General considerations notes')"></textarea>
      </div>
    </div>`;

  // --- EDITORIAL ---
  if(p.editorial){
    const ck = 'editorial';
    container.innerHTML += `
      <div class="section">
        <div class="section-header">Our Editorial Assessment</div>
        <div class="section-body">
          <div class="text-row">
            <div class="text-row-value" style="font-size:14px;line-height:1.7;">${p.editorial}</div>
            ${makeFeedbackBtns(ck, 'Editorial assessment')}
          </div>
        </div>
        <div class="additions-area">
          <label>Any response or corrections to our editorial assessment?</label>
          <textarea placeholder="e.g. We'd like to note that since this was written..." oninput="trackCorrection('editorial_response',this.value,'Editorial response')"></textarea>
        </div>
      </div>`;
  }

  // --- RECENT NE^EWS ---
  let newsHTML = '';
  if(p.recentNews){
    for(let i=0;i<p.recentNews.length;i++){
      const n=p.recentNews[i];
      const ck = `news_${i}`;
      newsHTML += `<div class="text-row" style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;">
        <div style="flex:1"><span style="color:var(--accent);font-weight:600;">${n.date}</span> â ${n.text}</div>
        ${makeFeedbackBtns(ck, 'News: '+n.text.substring(0,50))}
      </div>`;
    }
  }

  container.innerHTML += `
    <div class="section">
      <div class="section-header">Recent News & Updates</div>
      <div class="section-body">${newsHTML}</div>
      <div class="additions-area">
        <label>Any recent news or updates we should add?</label>
        <textarea placeholder="e.g. In March 2026, we launched..." oninput="trackCorrection('news_general',this.value,'General news additions')"></textarea>
      </div>
    </div>`;

  // --- EXAMPLES ---
  let exHTML = '';
  if(p.examples){
    for(let i=0;i<p.examples.length;i++){
      const e=p.examples[i];
      const ck = `example_${i}`;
      exHTML += `<div class="text-row" style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;">
        <div style="flex:1"><strong>${e.name}</strong> â ${e.desc}<br><span style="font-size:12px;color:var(--text-muted);">${e.url}</span></div>
        ${makeFeedbackBtns(ck, 'Example: '+e.name)}
      </div>`;
    }
  }

  container.innerHTML += `
    <div class="section">
      <div class="section-header">Example Communities</div>
      <div class="section-body">${exHTML}</div>
      <div class="additions-area">
        <label>Any showcase communities we should add or remove?</label>
        <textarea placeholder="e.g. Please add: [Company] Community at [URL]..." oninput="trackCorrection('examples_general',this.value,'General examples notes')"></textarea>
      </div>
    </div>`;

  // --- SUBMIT ---
  container.innerHTML += `
    <div class="submit-section">
      <h3>Submit Your Review</h3>
      <p>When you're done reviewing, click below to send your feedback to FeverBee.<br>This will open your email client with a summary of all your corrections.</p>
      <button class="submit-btn" onclick="submitReview()">Send Corrections to FeverBee</button>
      <div class="summary-count" id="summaryCount">No corrections marked yet</div>
    </div>
    <div style="text-align:center;padding:30px;color:var(--text-muted);font-size:12px;">
      Thank you for helping us maintain accurate data. â The FeverBee Team
    </div>`;

  // --- Global functions ---
  window.markFeedback = function(btn, correctionId){
    const parent = btn.closest('.feedback-toggle');
    const val = btn.dataset.val;
    const sibs = parent.querySelectorAll('.fb-btn');
    const corrBox = document.getElementById(correctionId);

    // Toggle
    const wasActive = btn.classList.contains('active-yes') || btn.classList.contains('active-no');
    sibs.forEach(s => { s.classList.remove('active-yes','active-no'); });

    if(!wasActive){
      btn.classList.add(val==='yes'?'active-yes':'active-no');
      if(val==='no'){
        corrBox.classList.add('visible');
        corrBox.querySelector('textarea').focus();
      } else {
        corrBox.classList.remove('visible');
        // Track as confirmed correct
        const key = parent.dataset.key;
        corrections[key] = {status:'confirmed', note:''};
      }
    } else {
      corrBox.classList.remove('visible');
      const key = parent.dataset.key;
      delete corrections[key];
    }
    updateSummary();
  };

  window.trackCorrection = function(key, value, label){
    if(value.trim()){
      corrections[key] = {status:'correction', note:value.trim(), label:label};
    } else {
      delete corrections[key];
    }
    updateSummary();
  };

  function updateSummary(){
    const confirmed = Object.values(corrections).filter(c=>c.status==='confirmed').length;
    const corrected = Object.values(corrections).filter(c=>c.status==='correction' && c.note).length;
    const el = document.getElementById('summaryCount');
    const parts = [];
    if(confirmed) parts.push(`${confirmed} confirmed correct`);
    if(corrected) parts.push(`${corrected} correction${corrected>1?'s':''}`);
    el.textContent = parts.length ? parts.join(', ') : 'No corrections marked yet';
  }

  window.submitReview = function(){
    const correctionEntries = Object.entries(corrections).filter(([k,v])=>v.status==='correction' && v.note);
    const confirmedCount = Object.values(corrections).filter(c=>c.status==='confirmed').length;

    let body = `Platform Data Review: ${p.name}\n`;
    body += `Submitted: ${new Date().toLocaleDateString()}\n`;
    body += `Items confirmed correct: ${confirmedCount}\n`;
    body += `Corrections/additions: ${correctionEntries.length}\n`;
    body += `\n${'='.repeat(50)}\n\n`;

    if(correctionEntries.length === 0 && confirmedCount === 0){
      alert('Please review at least some items before submitting.');
      return;
    }

    if(correctionEntries.length > 0){
      body += `CORRECTIONS & ADDITIONS:\n\n`;
      for(const [key,val] of correctionEntries){
        body += `--- ${val.label || key} ---\n`;
        body += `${val.note}\n\n`;
      }
    }

    if(confirmedCount > 0 && correctionEntries.length === 0){
      body += `All reviewed items were confirmed as correct. No changes needed.\n`;
    }

    const subject = encodeURIComponent(`Platform Data Review: ${p.name}`);
    const mailBody = encodeURIComponent(body);
    window.location.href = `mailto:richard@feverbee.com?subject=${subject}&body=${mailBody}`;
  };

})();
  </script>
</body>
</html>
